name: carsi2
region: syd

services:
  - name: web
    github:
      repo: CleanExpo/CARSI
      branch: main
      deploy_on_push: true

    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs

    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME

      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME

      - key: JWT_SECRET
        scope: RUN_TIME

      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME

      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME

      - key: OPENAI_API_KEY
        scope: RUN_TIME

      - key: NEXT_PUBLIC_FRONTEND_URL
        value: https://carsi.com.au
        scope: RUN_AND_BUILD_TIME

      - key: NEXT_PUBLIC_APP_URL
        value: https://carsi.com.au
        scope: RUN_AND_BUILD_TIME

      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        value: pk_live_REPLACE_IN_DO_UI
        scope: RUN_AND_BUILD_TIME
