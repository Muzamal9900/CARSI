# DigitalOcean App Platform — same spec as `.do/app.yaml` (some flows expect `project.yml` at repo root).

name: carsi
region: syd
features:
  - buildpack-stack=ubuntu-22

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: web
    runtime: nodejs:20
    environment_slug: node-js
    github:
      repo: CleanExpo/CARSI
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    source_dir: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_FRONTEND_URL
        scope: RUN_AND_BUILD_TIME
        value: https://carsi.com.au
