# DigitalOcean App Platform — App Spec (use this path only).
# Do not add a repo-root `project.yml` for App Spec: DO parses `project.yml` as a
# different schema (e.g. Functions) and rejects App Spec keys like `name`.
#
# Apply: App → Settings → App Spec → Edit, or `doctl apps update --spec .do/app.yaml`
#
# Set secret values in the control panel (do not commit real credentials).

name: carsi
region: syd
features:
  - buildpack-stack=ubuntu-22

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: web
    # Supported runtimes include nodejs:18, nodejs:20, nodejs:22, nodejs:24 (see DO build logs)
    runtime: nodejs:20
    environment_slug: node-js
    github:
      repo: CleanExpo/CARSI
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    source_dir: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_FRONTEND_URL
        scope: RUN_AND_BUILD_TIME
        value: https://carsi.com.au
