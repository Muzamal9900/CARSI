# DigitalOcean App Platform — App Spec (NOT project.yml: that name is for DO Functions)
#
# Root Dockerfile is used when `dockerfile_path` is set (avoids `typescript:default` buildpack).
#
# Apply: App → Settings → App Spec → Edit → paste, Save. Set SECRET values in the dashboard.

name: carsi
region: syd

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: CleanExpo/CARSI
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    source_dir: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        type: general
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: secret
      - key: JWT_SECRET
        scope: RUN_TIME
        type: secret
      - key: NEXT_PUBLIC_FRONTEND_URL
        scope: RUN_AND_BUILD_TIME
        type: general
        value: https://carsi.com.au
