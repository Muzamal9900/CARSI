# DigitalOcean App Platform — App Spec
#
# The repo includes a root Dockerfile. App Platform uses it when `dockerfile_path` is set,
# which avoids buildpack auto-detection that can select an invalid `typescript:default` runtime.
#
# Apply in: App → Settings → App Spec → Edit (paste this file), then Save & redeploy.

name: carsi
region: syd

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: CleanExpo/CARSI
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    source_dir: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_FRONTEND_URL
        scope: RUN_AND_BUILD_TIME
        value: https://carsi.com.au
