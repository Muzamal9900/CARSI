apiVersion: apps/v1
kind: Deployment
metadata:
  name: carsi-backend
  namespace: carsi-staging
  labels:
    app: carsi-backend
    app.kubernetes.io/part-of: carsi-lms
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carsi-backend
  template:
    metadata:
      labels:
        app: carsi-backend
        environment: staging
    spec:
      containers:
        - name: backend
          image: ghcr.io/carsi-lms/backend:staging
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: debug
            - name: AI_PROVIDER
              value: ollama
            - name: REDIS_URL
              value: redis://carsi-redis:6379/0
          envFrom:
            - secretRef:
                name: carsi-staging-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: carsi-backend
  namespace: carsi-staging
  labels:
    app: carsi-backend
    app.kubernetes.io/part-of: carsi-lms
spec:
  type: ClusterIP
  selector:
    app: carsi-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
