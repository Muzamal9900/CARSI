# CARSI LMS — Staging Secrets Template
#
# This is a TEMPLATE only. Do not commit actual secret values.
#
# Usage:
#   1. Copy .env.staging.example to .env.staging
#   2. Fill in staging-specific values
#   3. Apply with:
#      kubectl create secret generic carsi-staging-secrets \
#        --from-env-file=.env.staging \
#        -n carsi-staging
#
# Alternatively, apply this template and patch values individually:
#   kubectl apply -f k8s/staging/secrets-template.yaml
#   kubectl -n carsi-staging patch secret carsi-staging-secrets \
#     -p '{"stringData":{"JWT_SECRET_KEY":"your-staging-secret"}}'

apiVersion: v1
kind: Secret
metadata:
  name: carsi-staging-secrets
  namespace: carsi-staging
  labels:
    app.kubernetes.io/part-of: carsi-lms
    environment: staging
type: Opaque
stringData:
  # Database (use a separate staging database)
  DATABASE_URL: 'postgresql://carsi_user:CHANGE_ME@carsi-staging-postgres:5432/carsi_staging'
  POSTGRES_PASSWORD: 'CHANGE_ME'

  # Authentication
  JWT_SECRET_KEY: 'CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32'

  # Stripe (use test mode keys)
  STRIPE_SECRET_KEY: 'sk_test_CHANGE_ME'
  STRIPE_WEBHOOK_SECRET: 'whsec_CHANGE_ME'
  STRIPE_PRICE_ID: 'price_CHANGE_ME'

  # Google Drive (same OAuth app, separate folder)
  GOOGLE_CLIENT_ID: 'CHANGE_ME.apps.googleusercontent.com'
  GOOGLE_CLIENT_SECRET: 'CHANGE_ME'
  GOOGLE_REFRESH_TOKEN: 'CHANGE_ME'

  # Email (use Mailpit or staging SMTP)
  SMTP_HOST: 'smtp.example.com'
  SMTP_PORT: '587'
  SMTP_USER: 'CHANGE_ME'
  SMTP_PASSWORD: 'CHANGE_ME'
  EMAIL_FROM: 'noreply-staging@carsi.com.au'
