apiVersion: apps/v1
kind: Deployment
metadata:
  name: carsi-web
  namespace: carsi-staging
  labels:
    app: carsi-web
    app.kubernetes.io/part-of: carsi-lms
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carsi-web
  template:
    metadata:
      labels:
        app: carsi-web
        environment: staging
    spec:
      containers:
        - name: web
          image: ghcr.io/carsi-lms/web:staging
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: staging
            - name: NEXT_PUBLIC_BACKEND_URL
              value: https://api-staging.carsi.com.au
            - name: BACKEND_URL
              value: http://carsi-backend:8000
          envFrom:
            - secretRef:
                name: carsi-staging-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: carsi-web
  namespace: carsi-staging
  labels:
    app: carsi-web
    app.kubernetes.io/part-of: carsi-lms
spec:
  type: ClusterIP
  selector:
    app: carsi-web
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
