name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/carsi-lms/web
  BACKEND_IMAGE: ghcr.io/carsi-lms/backend

jobs:
  build-and-push:
    name: Build & Push Docker Images (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:staging
            ${{ env.WEB_IMAGE }}:staging-${{ steps.meta.outputs.sha }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://api-staging.carsi.com.au
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:staging
            ${{ env.BACKEND_IMAGE }}:staging-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}

  deploy-to-k8s:
    name: Deploy to Kubernetes (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Apply namespace and configs
        # Note: applies only top-level files in k8s/staging/ (not subdirs)
        # secrets-template.yaml is intentionally kept in k8s/staging/templates/ to avoid overwriting real secrets
        run: |
          kubectl apply -f k8s/staging/namespace.yaml
          kubectl apply -f k8s/staging/

      - name: Set image tags
        env:
          SHA: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          kubectl set image deployment/carsi-web \
            web=${{ env.WEB_IMAGE }}:staging-${SHA} \
            -n carsi-staging

          kubectl set image deployment/carsi-backend \
            backend=${{ env.BACKEND_IMAGE }}:staging-${SHA} \
            -n carsi-staging

      - name: Wait for web rollout
        run: kubectl rollout status deployment/carsi-web -n carsi-staging --timeout=300s

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/carsi-backend -n carsi-staging --timeout=300s

      - name: Verify deployment health
        run: |
          echo "Checking web pods..."
          kubectl get pods -n carsi-staging -l app=carsi-web -o wide
          echo ""
          echo "Checking backend pods..."
          kubectl get pods -n carsi-staging -l app=carsi-backend -o wide
