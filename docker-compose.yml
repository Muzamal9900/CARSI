services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: carsi-postgres
    environment:
      POSTGRES_DB: carsi_dev
      POSTGRES_USER: carsi_user
      POSTGRES_PASSWORD: carsi_dev_pass
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5433:5432'
    volumes:
      - carsi_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carsi_user -d carsi_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carsi-network

  redis:
    image: redis:7-alpine
    container_name: carsi-redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carsi-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: carsi-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: unless-stopped
    networks:
      - carsi-network

volumes:
  carsi_postgres_data:
    driver: local

networks:
  carsi-network:
    driver: bridge
